#!/usr/bin/env bash

set -euo pipefail

# Get all nodes that are NOT control-plane
nodes=$(kubectl get nodes -o json | jq -r '
  .items[]
  | select(.metadata.labels["node-role.kubernetes.io/control-plane"] == null)
  | .metadata.name
')

if [[ -z "${nodes}" ]]; then
  echo "No worker nodes found to cordon/drain."
  exit 0
fi

echo "Worker nodes:"
echo "${nodes}"
echo
echo "Cordoning all worker nodes..."

for node in ${nodes}; do
  echo "Cordoning ${node} ..."
  kubectl cordon "${node}" || true
done

echo
echo "All worker nodes cordoned."
echo
echo "Draining worker nodes..."

for node in ${nodes}; do
  echo "Draining ${node} ..."
  kubectl drain "${node}" \
    --ignore-daemonsets \
    --delete-emptydir-data \
    --force
done

echo
echo "All worker nodes drained."
